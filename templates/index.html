<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODD Alerts Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div>
                <h1>ODD Alerts Dashboard</h1>
                <p>Monitoring alert counts by name, year, month and date</p>
            </div>
        </header>

        <main class="content">
            <section class="card">
                <div class="card-header">
                    <h2>Available Alert Statuses</h2>
                    <p>Select a name to view yearly totals, monthly and daily counts.</p>
                </div>

                <div class="summary-table">
                    <div class="table-header">
                        <div>Name / Year / Month / Date</div>
                        <div>Total Count</div>
                    </div>

                    <div id="yearList" class="table-body"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
